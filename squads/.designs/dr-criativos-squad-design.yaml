# Squad Design Blueprint — dr-criativos (v2)
# Generated by @squad-creator (Craft) via *design-squad
# Source: docs/departments/criativos.md (v2 — redesign task-first)
# Overwrites v1 (5 agentes → 2 agentes + 6 tasks puras)

squad:
  name: dr-criativos
  description: "Producao de criativos para campanhas de Direct Response — pipeline automatizado com curadoria humana"
  domain: direct-response-creatives
  department: marketing
  volume_target: "20-30+ criativos/dia"
  geos: [FR, ES, EN]
  principle: "Task-first: tasks definem O QUE, agentes executam ONDE precisa de julgamento"

analysis:
  entities:
    - Oferta
    - Criativo
    - Referencia
    - Angulo
    - Script
    - Brief
    - Winner
    - Hook
    - Mecanismo
    - Prova
    - CTA
  workflows:
    - creative-pipeline
  workflow_phases:
    - name: intelligence
      description: "Pesquisa, coleta de dados e desconstrucao de referencias"
      mix: "tasks puras + agente (@copy-chief interpret) + humano (spy)"
    - name: strategy
      description: "Definicao de angulos, metodo de producao (modelagem 80% / variacao 15% / do zero 5%)"
      mix: "agente (@stefan-georgi suggest) + humano (decisao final)"
    - name: production
      description: "Geracao de scripts e ad copy"
      mix: "agente (@stefan-georgi generate)"
    - name: review
      description: "Revisao de qualidade com loop corretivo (max 2 rodadas)"
      mix: "agente (@copy-chief review) + humano (double-check opcional)"
    - name: delivery
      description: "Router por formato (imagem/video/variacao), brief pro editor, handoff"
      mix: "tasks puras + humano (edicao + aprovacao final)"
  integrations:
    - Meta Ads Library
    - TikTok Creative Center
    - Facebook Ads (performance data)
    - Gemini
    - ChatGPT
    - Dream Face
    - Nano Banana
    - Notion (handoff)
  stakeholders:
    - role: Copywriter
      type: human
      intervention_points: ["1.1", "1.3", "2.2", "2.3", "5.3"]
    - role: Copy Chief
      type: human
      intervention_points: ["4 (double-check opcional)"]
    - role: Editor
      type: human
      intervention_points: ["5.2"]
    - role: Gestor de Trafego
      type: downstream
      intervention_points: ["5.4 (handoff)"]
  out_of_scope:
    - Spy / pesquisa de referencias (copy humano)
    - Edicao de video (editores humanos)
    - Upload e gestao de campanhas (squad trafego futuro)

recommendations:
  agents:
    - id: stefan-georgi
      role: "Copywriter de Direct Response — gera scripts, variacoes, sugere angulos e adapta culturalmente por geo"
      type: local
      why_agent: "Faz julgamento criativo: tom, estilo, adaptacao cultural, escolha de hook"
      commands:
        - suggest-angles
        - generate-scripts
        - generate-ad-copy
      confidence: 0.95
      user_added: false
      user_modified: false

    - id: copy-chief
      role: "Copy Chief — revisa qualidade de criativos, interpreta dados de performance com nuance, decide corrigir/descartar"
      type: shared
      why_agent: "Julga se criativo tem cara de winner, interpreta dados com contexto, faz trade-off risco vs potencial"
      shared_with:
        - squad: dr-funnel-copy
          status: planned
        - squad: cro
          status: planned
      commands:
        - interpret-offer-data
        - review-creative
        - request-revision
      confidence: 0.95
      user_added: false
      user_modified: false

  tasks:
    # --- Tasks executadas por @stefan-georgi ---
    - name: suggest-angles
      agent: stefan-georgi
      entrada:
        - patterns das referencias desconstruidas
        - winners historicos
        - dados de performance da oferta
      saida:
        - angulos rankeados por confianca
      confidence: 0.92

    - name: generate-scripts
      agent: stefan-georgi
      entrada:
        - angulos selecionados
        - oferta
        - geo
        - formato
        - metodo (modelagem | do-zero)
      saida:
        - 5-10 variacoes de script por angulo
        - "estrutura: Hook > Problema > Mecanismo > Prova > CTA"
        - cada variacao testa UMA variavel
      confidence: 0.94

    - name: generate-ad-copy
      agent: stefan-georgi
      entrada:
        - scripts aprovados
        - plataforma (Meta | TikTok)
      saida:
        - headlines
        - descriptions
        - captions
      confidence: 0.90

    # --- Tasks executadas por @copy-chief ---
    - name: interpret-offer-data
      agent: copy-chief
      entrada:
        - dados brutos de performance (ROAS, CPA, CTR, spend)
      saida:
        - analise contextualizada
        - "recomendacao (problema e criativo, LP, ou oferta?)"
      confidence: 0.93

    - name: review-creative
      agent: copy-chief
      entrada:
        - scripts gerados
        - contexto oferta/funil/geo
      saida:
        - "veredicto: APPROVED | REVISION_NEEDED | REJECTED"
        - feedback detalhado
      review_criteria:
        - "Hook forte nos primeiros 3s?"
        - "Mecanismo crivel pro geo?"
        - "Tom combina com oferta?"
        - "CTA clara e urgente?"
      max_revision_rounds: 2
      confidence: 0.95

    - name: request-revision
      agent: copy-chief
      entrada:
        - criativo rejeitado ou com problemas
        - feedback do review
      saida:
        - instrucoes especificas do que mudar (sem reescrever)
      confidence: 0.88

    # --- Tasks puras (sem agente) ---
    - name: fetch-offer-data
      agent: null
      entrada:
        - offer_id
      saida:
        - dados brutos de performance (ROAS, CPA, CTR, spend, winners)
      confidence: 0.95

    - name: catalog-references
      agent: null
      entrada:
        - referencias brutas salvas pelo Copy
      saida:
        - referencias estruturadas com metadata
      metadata_fields:
        - formato
        - tipo de conteudo
        - mecanismo
        - nicho
        - plataforma de origem
        - spend estimado
        - estilo de edicao
      confidence: 0.90

    - name: deconstruct-references
      agent: null
      entrada:
        - referencias catalogadas
      saida:
        - "Hook / Mechanism / Proof / CTA extraidos"
        - patterns dominantes identificados
      confidence: 0.92

    - name: generate-images
      agent: null
      entrada:
        - script aprovado
        - formato (imagem | carrossel | dinamico)
        - geo
      saida:
        - prompts de imagem
        - "5+ variacoes (cores, layout, texto, estilo)"
      confidence: 0.88

    - name: build-video-brief
      agent: null
      entrada:
        - script aprovado
        - estilo de edicao (UGC, cinematografica, podcast, breaking news, etc)
        - persona e aparencia dos avatares
      saida:
        - brief simples pro editor
        - "tom visual, copy na tela, CTA final"
      note: "NAO e scene-by-scene. Editor tem liberdade criativa."
      confidence: 0.90

    - name: build-variation-brief
      agent: null
      entrada:
        - creative_id do winner existente
        - tipo de variacao (avatar, edicao, hook visual)
      saida:
        - brief de variacao (mesma copy, nova embalagem)
      confidence: 0.92

  template: custom
  config_mode: extend

pipeline:
  description: "Fluxo principal — creative-pipeline (5 fases)"
  flow:
    - phase: 1-intelligence
      steps:
        - task: fetch-offer-data
          trigger: "Copy escolhe oferta"
        - task: interpret-offer-data
          agent: copy-chief
          trigger: "Dados brutos disponiveis"
        - human: "Copy faz spy e salva referencias"
        - task: catalog-references
          trigger: "Referencias salvas pelo Copy"
        - task: deconstruct-references
          trigger: "Referencias catalogadas"

    - phase: 2-strategy
      steps:
        - task: suggest-angles
          agent: stefan-georgi
          trigger: "Patterns + winners + offer data disponiveis"
        - human: "Copy escolhe angulos, metodo (modelagem 80% / variacao 15% / do-zero 5%)"
        - branch:
            modelagem: "→ Fase 3 (production)"
            variacao: "→ build-variation-brief → Fase 5 (delivery)"
            do-zero: "→ Fase 3 (modo livre)"

    - phase: 3-production
      steps:
        - task: generate-scripts
          agent: stefan-georgi
        - task: generate-ad-copy
          agent: stefan-georgi

    - phase: 4-review
      steps:
        - task: review-creative
          agent: copy-chief
        - branch:
            APPROVED: "→ Fase 5"
            REVISION_NEEDED: "→ request-revision → stefan-georgi corrige → re-review (max 2x)"
            REJECTED: "→ descarta ou converte em revision"
        - human: "Copy Chief humano double-check (opcional)"

    - phase: 5-delivery
      steps:
        - router:
            imagem_carrossel_dinamico:
              task: generate-images
            video_ugc_podcast:
              task: build-video-brief
            variacao_existente:
              task: build-variation-brief
        - human: "Editor produz video/imagem final"
        - human: "Copy revisa se ficou dentro do esperado"
        - handoff: "Gestor de trafego"

geos:
  supported:
    - id: fr
      label: "Frances (worldwide)"
      tone: "Formal, elegante, sofisticado. Evitar hype americano. Argumentacao logica."
      compliance: "Gateway FR rigoroso com claims de saude"
    - id: es
      label: "Espanhol (worldwide)"
      tone: "Caloroso, emocional, proximo. Enfase em familia, comunidade, transformacao pessoal."
      compliance: "Menor restricao, atencao a claims financeiros"
    - id: en
      label: "Ingles (EUA)"
      tone: "Direto, urgente, orientado a resultados. Enfase em numeros, ROI, velocidade."
      compliance: "FTC guidelines, health claims, income claims"
  rule: "Adaptacao cultural = NUNCA traducao literal"

