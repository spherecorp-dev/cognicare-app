# Squad Design Blueprint
# Generated by squad-creator (Craft)
# Created: 2026-02-20

squad:
  name: media-squad
  description: "Squad especializado em gestão de campanhas Meta Ads - decisões estratégicas com aprendizado contínuo, infraestrutura de tracking via RedTrack, execução de campanhas e análise/otimização em tempo real"
  domain: meta-ads-campaign-management
  version: "1.0.0"
  focus_platform: meta  # MVP foca em Meta, estrutura preparada para TikTok/Google/Native

analysis:
  entities:
    - Offer
    - Creative
    - Campaign
    - Ad Set
    - Ad
    - Decision Log
    - Performance Metrics
    - Creative Profile
    - RedTrack Campaign
    - Business Manager

  workflows:
    - offer-campaign-launch
    - strategic-decision-making
    - meta-execution
    - performance-monitoring-24-7
    - feedback-loop
    - account-warming
    - tracking-verification

  integrations:
    - Meta Ads API
    - RedTrack
    - File System (offers/, decision_log.json, performance/)
    - Multilogin
    - Proxy Services

  stakeholders:
    - Media Buyer
    - Strategic Head
    - Performance Analyst
    - Infrastructure Engineer

recommendations:
  agents:
    # AGENTE 1: ESTRATEGISTA
    - id: media-head
      name: "Media Head"
      role: "Estrategista sênior - toma decisões estratégicas, define budget, aprova GO/NO-GO, cria contingências e aprende via decision log"
      icon: "🎯"
      archetype: "Strategist"
      confidence: 0.98
      user_added: false
      user_modified: false
      commands:
        - name: analyze-context
          description: "Analisa contexto da oferta, creative_profile e histórico"
        - name: decide-structure
          description: "Define estrutura de campanha (CBO vs ABO, new vs existing)"
        - name: define-budget
          description: "Aloca budget e define limites"
        - name: define-bidding
          description: "Define estratégia de lances (Cost Cap, Lowest Cost, etc.)"
        - name: define-funnel
          description: "Define landing page, funil e offer angle"
        - name: create-contingency
          description: "Cria plano B caso campanha não performe"
        - name: log-decision
          description: "Registra decisão + justificativa no decision log"
        - name: approve-launch
          description: "Decisão final GO/NO-GO"
      tasks:
        - analyze-campaign-context
        - decide-campaign-structure
        - define-budget-allocation
        - define-bidding-strategy
        - define-funnel-strategy
        - create-contingency-plan
        - log-strategic-decision
        - approve-campaign-launch

    # AGENTE 2: INFRAESTRUTURA
    - id: media-engineer
      name: "Media Engineer"
      role: "Especialista em infraestrutura técnica - configura RedTrack, gerencia pixels, verifica atribuição, aquece perfis (Multilogin/proxies) e garante health de contas"
      icon: "🔧"
      archetype: "Builder"
      confidence: 0.95
      user_added: false
      user_modified: false
      commands:
        - name: setup-redtrack
          description: "Integra oferta com RedTrack"
        - name: setup-pixel
          description: "Instala e verifica pixels Meta"
        - name: verify-attribution
          description: "Valida se vendas estão sendo atribuídas via RedTrack"
        - name: configure-postback
          description: "Configura postbacks RedTrack → Meta"
        - name: warm-account
          description: "Aquece perfis com Multilogin e proxies"
        - name: check-bm-health
          description: "Verifica Business Manager status"
        - name: setup-domain
          description: "Configura domínios para ads"
        - name: test-tracking
          description: "Testa fluxo completo RedTrack"
      tasks:
        - setup-redtrack-integration
        - setup-tracking-pixel
        - verify-sales-attribution
        - configure-redtrack-postback
        - warm-account-profiles
        - check-business-manager-health
        - setup-ad-domain
        - test-redtrack-flow

    # AGENTE 3: EXECUTOR
    - id: media-buyer
      name: "Media Buyer"
      role: "Executor generalista - monta ads (copy, títulos, descrições), publica em Meta, otimiza lances e realoca budget em tempo real"
      icon: "🚀"
      archetype: "Executor"
      confidence: 0.92
      user_added: false
      user_modified: false
      commands:
        - name: assemble-ad
          description: "Monta ad completo (copy, creative, headline, description)"
        - name: publish-campaign
          description: "Publica campanha no Meta Ads"
        - name: upload-creative
          description: "Upload de criativos para Meta"
        - name: adjust-bid
          description: "Ajusta lances (manual ou auto)"
        - name: reallocate-budget
          description: "Move budget entre adsets"
        - name: scale-winner
          description: "Aumenta budget de winner"
        - name: pause-loser
          description: "Pausa loser automaticamente"
      tasks:
        - assemble-ad-content
        - publish-meta-campaign
        - upload-creative-assets
        - adjust-campaign-bids
        - reallocate-campaign-budget
        - scale-winning-ads
        - pause-losing-ads

    # AGENTE 4: ANALISTA
    - id: media-analyst
      name: "Media Analyst"
      role: "Monitor e analista - monitora anomalias 24/7, alerta problemas críticos, analisa KPIs diariamente, classifica Winners/Losers, identifica tendências e gera relatórios semanais"
      icon: "📊"
      archetype: "Analyst"
      confidence: 0.94
      user_added: false
      user_modified: false
      commands:
        - name: monitor-anomalies
          description: "Monitora anomalias em tempo real (24/7)"
        - name: detect-rejected
          description: "Detecta criativos rejeitados"
        - name: alert-critical
          description: "Envia alertas críticos"
        - name: auto-recover
          description: "Auto-recovery de campanhas"
        - name: collect-metrics
          description: "Coleta métricas do Meta"
        - name: analyze-kpis
          description: "Análise diária de performance"
        - name: classify-performance
          description: "Classifica ads como WINNER/LOSER"
        - name: detect-trends
          description: "Identifica tendências e padrões"
        - name: generate-report
          description: "Relatório semanal consolidado"
        - name: recommend-actions
          description: "Recomenda ações baseadas em análise"
      tasks:
        - monitor-anomalies
        - detect-rejected-creatives
        - send-critical-alerts
        - auto-recover-campaigns
        - collect-platform-metrics
        - analyze-daily-kpis
        - classify-ad-performance
        - detect-performance-trends
        - generate-weekly-report
        - recommend-optimization-actions

  tasks:
    # MEDIA-HEAD TASKS
    - name: analyze-campaign-context
      agent: media-head
      description: "Analisa contexto da oferta e histórico para embasar decisões estratégicas"
      entrada:
        - offer_id
        - creative_ids
        - human_instruction (optional)
      saida:
        - context_analysis
        - creative_profile
        - target_cpa
        - historical_patterns
      confidence: 0.95

    - name: decide-campaign-structure
      agent: media-head
      description: "Define estrutura de campanha Meta (CBO vs ABO, nova vs existente)"
      entrada:
        - context_analysis
        - decision_history
      saida:
        - structure_decision
        - rationale
      confidence: 0.92

    - name: define-budget-allocation
      agent: media-head
      description: "Define alocação de budget para campanha"
      entrada:
        - offer_data
        - structure_decision
      saida:
        - campaign_budget
        - adset_budgets
        - daily_limits
      confidence: 0.90

    - name: define-bidding-strategy
      agent: media-head
      description: "Define estratégia de lances baseada em creative_profile"
      entrada:
        - creative_profile
        - target_cpa
      saida:
        - bid_strategy
        - bid_amount
        - optimization_goal
      confidence: 0.94

    - name: define-funnel-strategy
      agent: media-head
      description: "Define landing page, funil e offer angle"
      entrada:
        - offer_data
        - creative_profile
      saida:
        - landing_page_url
        - pre_lander
        - offer_angle
        - redtrack_params
      confidence: 0.89

    - name: create-contingency-plan
      agent: media-head
      description: "Cria plano de contingência para campanha"
      entrada:
        - campaign_plan
        - risk_factors
      saida:
        - contingency_actions
        - triggers
      confidence: 0.85

    - name: log-strategic-decision
      agent: media-head
      description: "Registra decisão no decision log para aprendizado futuro"
      entrada:
        - decision_data
        - context
        - rationale
      saida:
        - decision_log_entry
      confidence: 0.98

    - name: approve-campaign-launch
      agent: media-head
      description: "Decisão final GO/NO-GO para lançamento"
      entrada:
        - campaign_plan
        - validation_results
      saida:
        - approval_status
        - feedback
      confidence: 0.88

    # MEDIA-ENGINEER TASKS
    - name: setup-redtrack-integration
      agent: media-engineer
      description: "Integra oferta com RedTrack"
      entrada:
        - offer_id
        - platform
        - product_url
        - target_cpa
      saida:
        - campaign_id_redtrack
        - tracking_url
        - integration_verified
      confidence: 0.93

    - name: setup-tracking-pixel
      agent: media-engineer
      description: "Configura pixel de tracking Meta"
      entrada:
        - platform
        - campaign_id_redtrack
      saida:
        - pixel_id
        - pixel_code
        - installation_verified
      confidence: 0.94

    - name: verify-sales-attribution
      agent: media-engineer
      description: "Verifica se vendas estão sendo atribuídas corretamente"
      entrada:
        - campaign_id_redtrack
        - time_window
      saida:
        - attribution_status
        - conversions_tracked
        - discrepancies
      confidence: 0.90

    - name: configure-redtrack-postback
      agent: media-engineer
      description: "Configura postbacks RedTrack para Meta"
      entrada:
        - campaign_id_redtrack
        - platform
        - conversion_events
      saida:
        - postback_urls
        - postback_verified
        - test_conversion_sent
      confidence: 0.91

    - name: warm-account-profiles
      agent: media-engineer
      description: "Aquece perfis de anúncio com Multilogin e proxies"
      entrada:
        - account_id
        - platform
        - warming_strategy
      saida:
        - warming_status
        - actions_completed
        - next_steps
      confidence: 0.90

    - name: check-business-manager-health
      agent: media-engineer
      description: "Verifica health do Business Manager"
      entrada:
        - bm_id
        - platform
      saida:
        - health_status
        - issues_detected
        - ad_account_limits
      confidence: 0.93

    - name: setup-ad-domain
      agent: media-engineer
      description: "Configura domínio para ads"
      entrada:
        - domain
        - platform
        - offer_id
      saida:
        - domain_verified
        - ssl_status
        - redtrack_integrated
      confidence: 0.87

    - name: test-redtrack-flow
      agent: media-engineer
      description: "Testa fluxo completo de tracking via RedTrack"
      entrada:
        - campaign_id_redtrack
        - platforms
        - test_scenarios
      saida:
        - test_results
        - conversion_fired
        - attribution_working
      confidence: 0.92

    # MEDIA-BUYER TASKS
    - name: assemble-ad-content
      agent: media-buyer
      description: "Monta conteúdo completo do ad"
      entrada:
        - creative_id
        - offer_data
        - meta_requirements
      saida:
        - ad_copy
        - headline
        - description
        - cta
        - assembled_ad
      confidence: 0.90

    - name: publish-meta-campaign
      agent: media-buyer
      description: "Publica campanha completa no Meta Ads"
      entrada:
        - campaign_plan
        - redtrack_url
        - creatives
        - bid_strategy
      saida:
        - campaign_id
        - adset_ids
        - ad_ids
        - publish_status
      confidence: 0.94

    - name: upload-creative-assets
      agent: media-buyer
      description: "Upload de criativos para Meta"
      entrada:
        - creative_files
        - meta_ad_account_id
      saida:
        - creative_ids
        - upload_status
        - meta_urls
      confidence: 0.93

    - name: adjust-campaign-bids
      agent: media-buyer
      description: "Ajusta lances de campanha"
      entrada:
        - campaign_id
        - new_bid_amount
        - bid_strategy
      saida:
        - adjustment_status
        - previous_bid
        - new_bid
        - effective_timestamp
      confidence: 0.91

    - name: reallocate-campaign-budget
      agent: media-buyer
      description: "Realoca budget entre adsets"
      entrada:
        - source_adset
        - target_adset
        - amount
      saida:
        - reallocation_status
        - new_budgets
        - effective_timestamp
      confidence: 0.89

    - name: scale-winning-ads
      agent: media-buyer
      description: "Escala budget de ads winners"
      entrada:
        - ad_id
        - scale_factor
        - max_budget
      saida:
        - scaling_status
        - previous_budget
        - new_budget
        - risk_assessment
      confidence: 0.92

    - name: pause-losing-ads
      agent: media-buyer
      description: "Pausa ads losers automaticamente"
      entrada:
        - ad_id
        - reason
        - preserve_data
      saida:
        - pause_status
        - pause_timestamp
        - data_archived
      confidence: 0.94

    # MEDIA-ANALYST TASKS
    - name: monitor-anomalies
      agent: media-analyst
      description: "Monitoramento 24/7 de anomalias em campanhas"
      entrada:
        - campaign_ids
        - monitoring_rules
        - alert_thresholds
      saida:
        - anomalies_detected
        - severity
        - notifications_sent
      confidence: 0.93

    - name: detect-rejected-creatives
      agent: media-analyst
      description: "Detecta criativos rejeitados pelo Meta"
      entrada:
        - campaign_ids
        - check_interval
      saida:
        - rejected_ads
        - rejection_reasons
        - resubmit_recommendations
      confidence: 0.95

    - name: send-critical-alerts
      agent: media-analyst
      description: "Envia alertas críticos"
      entrada:
        - alert_type
        - severity
        - campaign_data
        - recipients
      saida:
        - alert_sent
        - channel
        - delivery_status
      confidence: 0.91

    - name: auto-recover-campaigns
      agent: media-analyst
      description: "Recuperação automática de campanhas com problemas"
      entrada:
        - issue_type
        - campaign_id
        - recovery_strategy
      saida:
        - recovery_status
        - actions_taken
        - manual_intervention_needed
      confidence: 0.88

    - name: collect-platform-metrics
      agent: media-analyst
      description: "Coleta métricas do Meta Ads"
      entrada:
        - campaign_ids
        - date_range
        - metrics
      saida:
        - metrics_data
        - collection_timestamp
        - data_quality_score
      confidence: 0.94

    - name: analyze-daily-kpis
      agent: media-analyst
      description: "Análise diária de KPIs"
      entrada:
        - metrics_data
        - target_cpa
        - performance_thresholds
      saida:
        - kpi_analysis
        - trends_detected
        - alerts
      confidence: 0.92

    - name: classify-ad-performance
      agent: media-analyst
      description: "Classifica performance de ads (WINNER/LOSER)"
      entrada:
        - ad_metrics
        - target_cpa
        - classification_rules
      saida:
        - classifications
        - confidence_scores
      confidence: 0.96

    - name: detect-performance-trends
      agent: media-analyst
      description: "Detecta tendências de performance"
      entrada:
        - historical_metrics
        - time_window
        - trend_indicators
      saida:
        - trends
        - predictions
        - recommendations
      confidence: 0.89

    - name: generate-weekly-report
      agent: media-analyst
      description: "Gera relatório semanal consolidado"
      entrada:
        - week_data
        - campaigns
        - comparative_analysis
      saida:
        - report_file
        - executive_summary
        - action_items
      confidence: 0.90

    - name: recommend-optimization-actions
      agent: media-analyst
      description: "Recomenda ações de otimização"
      entrada:
        - performance_analysis
        - budget_remaining
        - historical_success
      saida:
        - recommendations
        - priority_scores
        - estimated_impact
      confidence: 0.87

  template: basic
  config_mode: extend

  # Estrutura de pastas sugerida
  structure:
    config:
      - meta-ad-specs.md
      - redtrack-config.md
      - classification-rules.md
    data:
      - decision-log-schema.json
      - performance-thresholds.yaml
    scripts:
      - meta-api-client.js
      - redtrack-client.js

metadata:
  created_at: "2026-02-20T00:00:00Z"
  created_by: "squad-creator (Craft)"
  source_docs:
    - "Verbal description - Meta Ads campaign management process"
  user_adjustments: 3
  adjustments_made:
    - "Focused on Meta platform only (TikTok/Google/Native for future)"
    - "Replaced GTM/CAPI with RedTrack integration"
    - "Consolidated from 6 agents to 4 agents (simplified structure)"
  overall_confidence: 0.93

notes: |
  Este squad foi desenhado com foco em Meta Ads (MVP), mas a arquitetura está
  preparada para expansão futura para TikTok, Google Ads e Native Ads.

  O media-head implementa aprendizado contínuo via decision log, permitindo
  que ele evolua de guiado por humanos para autônomo com o tempo.

  RedTrack é usado como plataforma central de tracking e atribuição.

  Principais fluxos:
  1. Head analisa contexto → decide estrutura → define bidding/budget
  2. Engineer configura RedTrack + pixels + verifica atribuição
  3. Buyer monta ads → publica → otimiza em tempo real
  4. Analyst monitora 24/7 → classifica performance → alerta problemas
